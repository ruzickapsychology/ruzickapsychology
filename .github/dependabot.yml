version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-and-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      sanity:
        patterns:
          - sanity
          - next-sanity
          - "@sanity/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
